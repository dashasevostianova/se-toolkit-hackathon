<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyEnglish — Word of the Day</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-gradient">
        <div class="bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">📚</span>
                <h1>DailyEnglish</h1>
            </div>
            <div style="display:flex;gap:10px;align-items:center;">
                <button class="settings-btn" onclick="toggleSettings()" title="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
                <div class="timer-badge" id="timerBadge">
                    <span class="timer-dot" id="timerDot"></span>
                    <span id="timer">3:00</span>
                </div>
            </div>
        </header>

        <!-- Settings Panel -->
        <div id="settingsPanel" class="settings-panel hidden">
            <div class="settings-header">
                <h3>⚙️ Daily Limit</h3>
                <button class="close-btn" onclick="toggleSettings()">✕</button>
            </div>
            <p class="settings-desc">How many words per session?</p>
            <div class="limit-options">
                <button class="limit-btn" data-limit="10" onclick="setLimit(10)">
                    <span class="limit-num">10</span>
                    <span class="limit-label">words</span>
                </button>
                <button class="limit-btn" data-limit="20" onclick="setLimit(20)">
                    <span class="limit-num">20</span>
                    <span class="limit-label">words</span>
                </button>
                <button class="limit-btn" data-limit="90" onclick="setLimit(90)">
                    <span class="limit-num">{{ total_words }}</span>
                    <span class="limit-label">all words</span>
                </button>
            </div>
            <div class="current-limit-display">
                Current: <span id="currentLimit">10</span> words per session
            </div>
        </div>

        <!-- Main Word Card -->
        <main class="word-section">
            <div id="wordCard" class="word-card">
                <!-- Loading -->
                <div class="card-loading" id="loading">
                    <div class="spinner"></div>
                </div>

                <!-- Word Content -->
                <div id="wordContent" class="card-content hidden">
                    <div class="word-header">
                        <span id="wordEmoji" class="word-emoji"></span>
                        <h2 id="wordText" class="word-text"></h2>
                    </div>

                    <div class="divider"></div>

                    <div class="translation-section">
                        <div class="translation-header">
                            <span class="label">🇷🇺 Translation</span>
                            <button id="revealBtn" class="reveal-btn" onclick="toggleTranslation()">
                                👁️ Show
                            </button>
                        </div>
                        <p id="wordTranslation" class="translation blur-text"></p>
                    </div>

                    <div class="example-section">
                        <span class="label">📝 Example</span>
                        <blockquote id="wordExample" class="example"></blockquote>
                    </div>

                    <!-- Pool exhausted notification -->
                    <div id="reshuffleBanner" class="reshuffle-banner hidden">
                        <span>🔀</span>
                        <p>Session complete! Words reshuffled for next round.</p>
                    </div>

                    <div class="card-footer">
                        <div class="pool-progress-mini">
                            <span id="poolProgressText">1 / 10</span>
                            <div class="progress-bar-mini">
                                <div id="poolProgressFill" class="progress-fill-mini" style="width: 0%"></div>
                            </div>
                        </div>
                        <button id="nextBtn" class="next-btn" onclick="fetchNextWord()">
                            <span>Next Word</span>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M5 12h14M12 5l7 7-7 7"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Stats -->
        <section class="stats-section">
            <div class="stats-card">
                <div class="stat-item">
                    <div class="stat-icon">✅</div>
                    <div class="stat-info">
                        <span id="statSeenToday" class="stat-value">0</span>
                        <span class="stat-label">Today</span>
                    </div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <div class="stat-icon">📖</div>
                    <div class="stat-info">
                        <span id="statDailyLimit" class="stat-value">10</span>
                        <span class="stat-label">Daily Limit</span>
                    </div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <div class="stat-icon">🔄</div>
                    <div class="stat-info">
                        <span id="statCycle" class="stat-value">1</span>
                        <span class="stat-label">Round</span>
                    </div>
                </div>
            </div>

            <div class="progress-bar-container">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>💡 New word auto-refreshes every 3 minutes</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
